# MongoDB connection config template.
# Copy this file to db_config.yaml and replace placeholders with your values.
# Password is NOT stored — scripts prompt at runtime via getpass.

mongo:
  uri_template: "mongodb+srv://{username}:{password}@<cluster>.mongodb.net/?retryWrites=true&w=majority"
  username: "<atlas-user>"
  database: "<db-name>"
  collection: "<collection-name>"
